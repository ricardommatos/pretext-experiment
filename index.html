<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code & Theory × Pretext</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0f; min-height: 100dvh; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
    canvas { display: block; }

    /* --- Loading screen --- */
    #loader {
      position: fixed; inset: 0; z-index: 200;
      background: #0a0a0f;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
    }
    #loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
    #loader .shimmer-bar {
      width: 200px; height: 2px; border-radius: 1px;
      background: rgba(255,255,255,0.04);
      overflow: hidden; position: relative;
    }
    #loader .shimmer-bar::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(196,163,90,0.4) 50%, transparent 100%);
      animation: shimmer 1.2s ease-in-out infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    #loader .loader-label {
      font: 500 9px/1 'Inter', sans-serif;
      color: rgba(255,255,255,0.2);
      letter-spacing: 2px; text-transform: uppercase;
    }

    /* --- Controls panel --- */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(to top, rgba(10,10,15,0.97) 0%, rgba(10,10,15,0.7) 60%, transparent 100%);
      padding: 32px 40px 24px;
      display: flex; align-items: flex-end; gap: 28px;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s;
    }
    #controls.visible { opacity: 1; transform: translateY(0); }

    .ctrl-group { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .ctrl-group label {
      font: 500 8px/1 'Inter', sans-serif;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1.8px; text-transform: uppercase;
    }

    /* Custom slider track */
    .slider-track {
      position: relative; width: 100px; height: 24px;
      display: flex; align-items: center; cursor: pointer;
    }
    .slider-track .track-bg {
      position: absolute; left: 0; right: 0; height: 2px;
      background: rgba(255,255,255,0.06); border-radius: 1px;
    }
    .slider-track .track-fill {
      position: absolute; left: 0; height: 2px;
      background: rgba(196,163,90,0.35); border-radius: 1px;
      transition: width 0.05s linear;
    }
    .slider-track .track-thumb {
      position: absolute; width: 10px; height: 10px;
      border-radius: 50%; background: #c4a35a;
      box-shadow: 0 0 8px rgba(196,163,90,0.2);
      transform: translate(-50%, 0);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .slider-track:hover .track-thumb {
      box-shadow: 0 0 14px rgba(196,163,90,0.35);
      transform: translate(-50%, 0) scale(1.15);
    }
    .slider-track:active .track-thumb {
      transform: translate(-50%, 0) scale(0.92);
    }
    .slider-track .track-value {
      position: absolute; right: -32px; top: 50%; transform: translateY(-50%);
      font: 400 9px/1 'Inter', sans-serif;
      color: rgba(255,255,255,0.15);
      font-variant-numeric: tabular-nums;
      min-width: 24px; text-align: right;
    }

    .mode-buttons { display: flex; gap: 6px; margin-left: auto; }
    .mode-buttons button {
      background: none; border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.25); font: 500 9px/1 'Inter', sans-serif;
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      letter-spacing: 1px; text-transform: uppercase;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .mode-buttons button:hover {
      border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.02);
    }
    .mode-buttons button:active { transform: scale(0.97); }
    .mode-buttons button.active {
      border-color: rgba(196,163,90,0.25); color: rgba(196,163,90,0.65);
      background: rgba(196,163,90,0.04);
    }

    #info {
      position: fixed; top: 20px; right: 24px; z-index: 100;
      font: 300 8px/1.8 'Inter', sans-serif; color: rgba(255,255,255,0.1);
      text-align: right; letter-spacing: 1px; text-transform: uppercase;
      opacity: 0; transition: opacity 0.8s 0.6s;
    }
    #info.visible { opacity: 1; }
    #title {
      position: fixed; top: 20px; left: 24px; z-index: 100;
      font: 700 9px/1 'Inter', sans-serif; color: rgba(255,255,255,0.15);
      letter-spacing: 2.5px; text-transform: uppercase;
      opacity: 0; transition: opacity 0.8s 0.5s;
    }
    #title.visible { opacity: 1; }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loader">
    <div class="loader-label">Measuring characters</div>
    <div class="shimmer-bar"></div>
  </div>

  <canvas id="c"></canvas>

  <div id="title">Code & Theory × Pretext</div>

  <div id="info">
    <div id="count"></div>
    <div>each char measured by pretext</div>
    <div>proportional width · not monospace</div>
  </div>

  <div id="controls">
    <div class="ctrl-group">
      <label>Force</label>
      <div class="slider-track" data-param="force" data-min="0" data-max="20" data-step="0.5" data-value="8">
        <div class="track-bg"></div>
        <div class="track-fill"></div>
        <div class="track-thumb"></div>
        <div class="track-value">8</div>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Radius</label>
      <div class="slider-track" data-param="radius" data-min="30" data-max="300" data-step="5" data-value="120">
        <div class="track-bg"></div>
        <div class="track-fill"></div>
        <div class="track-thumb"></div>
        <div class="track-value">120</div>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Spring</label>
      <div class="slider-track" data-param="spring" data-min="0.005" data-max="0.15" data-step="0.005" data-value="0.045">
        <div class="track-bg"></div>
        <div class="track-fill"></div>
        <div class="track-thumb"></div>
        <div class="track-value">.045</div>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Damping</label>
      <div class="slider-track" data-param="damping" data-min="0.7" data-max="0.98" data-step="0.01" data-value="0.88">
        <div class="track-bg"></div>
        <div class="track-fill"></div>
        <div class="track-thumb"></div>
        <div class="track-value">.88</div>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Density</label>
      <div class="slider-track" data-param="density" data-min="3" data-max="10" data-step="0.5" data-value="6">
        <div class="track-bg"></div>
        <div class="track-fill"></div>
        <div class="track-thumb"></div>
        <div class="track-value">6</div>
      </div>
    </div>
    <div class="mode-buttons">
      <button class="active" data-mode="form">Form</button>
      <button data-mode="scatter">Scatter</button>
      <button data-mode="wave">Wave</button>
    </div>
  </div>

  <script type="module">
    import { prepareWithSegments } from 'https://esm.sh/@chenglou/pretext@0.0.3'

    const FONT_SIZE = 10
    const FONT_FAMILY = '"Inter", system-ui, sans-serif'
    const TEXT = 'text is the most fundamental primitive of interface design every screen every application every moment of digital interaction begins and ends with text yet for thirty years the web has kept text locked behind a wall of expensive dom operations to measure a paragraph to know its height to understand where lines break you must surrender control to the browsers layout engine and wait pretext changes this equation entirely by implementing independent text measurement through pure arithmetic it makes text a first class programmable material not a rendered artifact to be measured after the fact but a mathematical entity whose behavior can be predicted manipulated and composed in real time code and theory '
    const CHARS = TEXT.split('')

    const canvas = document.getElementById('c')
    const ctx = canvas.getContext('2d')
    const countEl = document.getElementById('count')
    const loader = document.getElementById('loader')

    let W, H, DPR
    let mouseX = -999, mouseY = -999
    let mode = 'form'
    let params = { force: 8, radius: 120, spring: 0.045, damping: 0.88, density: 6 }

    // --- Custom sliders ---
    document.querySelectorAll('.slider-track').forEach(track => {
      const fill = track.querySelector('.track-fill')
      const thumb = track.querySelector('.track-thumb')
      const valEl = track.querySelector('.track-value')
      const min = parseFloat(track.dataset.min)
      const max = parseFloat(track.dataset.max)
      const step = parseFloat(track.dataset.step)
      const param = track.dataset.param
      let dragging = false

      function update(ratio) {
        ratio = Math.max(0, Math.min(1, ratio))
        let val = min + ratio * (max - min)
        val = Math.round(val / step) * step
        ratio = (val - min) / (max - min)
        const w = track.offsetWidth
        fill.style.width = (ratio * w) + 'px'
        thumb.style.left = (ratio * w) + 'px'
        valEl.textContent = val >= 1 ? Math.round(val * 10) / 10 : val.toFixed(3).replace(/^0/, '')
        params[param] = val
        if (param === 'density') rebuild()
      }

      update((parseFloat(track.dataset.value) - min) / (max - min))

      function onMove(clientX) {
        const rect = track.getBoundingClientRect()
        update((clientX - rect.left) / rect.width)
      }

      track.addEventListener('pointerdown', e => {
        dragging = true
        track.setPointerCapture(e.pointerId)
        onMove(e.clientX)
      })
      track.addEventListener('pointermove', e => { if (dragging) onMove(e.clientX) })
      track.addEventListener('pointerup', () => { dragging = false })
    })

    // Mode buttons
    document.querySelectorAll('.mode-buttons button').forEach(btn => {
      btn.addEventListener('click', () => {
        mode = btn.dataset.mode
        document.querySelectorAll('.mode-buttons button').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
      })
    })

    // --- Measure characters with Pretext ---
    const charWidths = new Map()
    const font = `${FONT_SIZE}px ${FONT_FAMILY}`
    for (const ch of new Set(CHARS)) {
      if (ch === ' ') { charWidths.set(ch, FONT_SIZE * 0.28); continue }
      const prepared = prepareWithSegments(ch, font)
      charWidths.set(ch, prepared.widths.length > 0 ? prepared.widths[0] : FONT_SIZE * 0.5)
    }

    let targetPoints = [], particles = []

    function rasterizeLogo() {
      return new Promise(resolve => {
        const img = new Image()
        const blob = new Blob([svgMarkup], { type: 'image/svg+xml' })
        img.onload = () => {
          const logoScale = (W * 0.8) / 138
          const logoW = Math.round(138 * logoScale), logoH = Math.round(10 * logoScale)
          const oc = document.createElement('canvas')
          oc.width = logoW; oc.height = logoH
          const ox = oc.getContext('2d')
          ox.drawImage(img, 0, 0, logoW, logoH)
          const data = ox.getImageData(0, 0, logoW, logoH).data
          const pts = [], step = Math.max(2, Math.round(params.density))
          const offX = (W - logoW) / 2, offY = (H - logoH) / 2
          for (let y = 0; y < logoH; y += step)
            for (let x = 0; x < logoW; x += step)
              if (data[(y * logoW + x) * 4 + 3] > 100)
                pts.push({ x: x + offX, y: y + offY })
          URL.revokeObjectURL(img.src)
          resolve(pts)
        }
        img.src = URL.createObjectURL(blob)
      })
    }

    function createParticle(i, tx, ty) {
      const ch = CHARS[i % CHARS.length]
      return {
        ch, w: charWidths.get(ch) || FONT_SIZE * 0.5,
        x: W * Math.random(), y: H * Math.random(), tx, ty,
        vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
        baseAlpha: 0.35 + Math.random() * 0.5, alpha: 0,
        rotation: (Math.random() - 0.5) * 0.5, rotTarget: 0,
        scale: 0.85 + Math.random() * 0.35,
      }
    }

    function resize() {
      DPR = Math.min(window.devicePixelRatio, 2)
      W = window.innerWidth; H = window.innerHeight
      canvas.width = W * DPR; canvas.height = H * DPR
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px'
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0)
    }

    async function rebuild() {
      targetPoints = await rasterizeLogo()
      while (particles.length < targetPoints.length)
        particles.push(createParticle(particles.length, 0, 0))
      particles.length = targetPoints.length
      for (let i = 0; i < particles.length; i++) {
        particles[i].tx = targetPoints[i].x
        particles[i].ty = targetPoints[i].y
      }
      countEl.textContent = `${particles.length} particles`
    }

    let time = 0
    function updateParticle(p, i) {
      time += 0.00001
      let tx = p.tx, ty = p.ty, sk = params.spring
      if (mode === 'scatter') {
        tx = p.x + (Math.random() - 0.5) * 80
        ty = p.y + (Math.random() - 0.5) * 80
        sk = 0.002; p.rotTarget = (Math.random() - 0.5) * 1.2
      } else if (mode === 'wave') {
        const ph = i * 0.03 + time * 600
        ty = p.ty + Math.sin(ph) * 25; sk = 0.06
        p.rotTarget = Math.sin(ph) * 0.15
      } else { p.rotTarget = 0 }

      const dx = tx - p.x, dy = ty - p.y
      p.vx += dx * sk; p.vy += dy * sk
      const cdx = p.x - mouseX, cdy = p.y - mouseY
      const cd = Math.sqrt(cdx * cdx + cdy * cdy)
      if (cd < params.radius && cd > 0) {
        const f = (1 - cd / params.radius) * params.force
        p.vx += (cdx / cd) * f; p.vy += (cdy / cd) * f
      }
      p.vx *= params.damping; p.vy *= params.damping
      p.x += p.vx; p.y += p.vy
      p.rotation += (p.rotTarget - p.rotation) * 0.08
      const dist = Math.sqrt(dx * dx + dy * dy)
      const ta = mode === 'scatter' ? p.baseAlpha * 0.35 : p.baseAlpha * (1 - Math.min(dist / 200, 0.6))
      p.alpha += (ta - p.alpha) * 0.1
    }

    function render() {
      ctx.clearRect(0, 0, W, H)
      const g = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.6)
      g.addColorStop(0, '#0d0d14'); g.addColorStop(1, '#0a0a0f')
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)
      if (mouseX > 0) {
        const cg = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, params.radius * 1.2)
        cg.addColorStop(0, 'rgba(196,163,90,0.05)')
        cg.addColorStop(0.5, 'rgba(196,163,90,0.02)')
        cg.addColorStop(1, 'rgba(196,163,90,0)')
        ctx.fillStyle = cg; ctx.fillRect(0, 0, W, H)
      }
      ctx.textBaseline = 'middle'
      for (const p of particles) {
        if (p.alpha < 0.01) continue
        ctx.save(); ctx.translate(p.x, p.y)
        if (Math.abs(p.rotation) > 0.01) ctx.rotate(p.rotation)
        const w = Math.min(1, Math.max(0, 1 - Math.sqrt((p.x - p.tx) ** 2 + (p.y - p.ty) ** 2) / 120))
        ctx.fillStyle = `rgba(${220 + w * 36|0},${220 - w * 57|0},${220 - w * 130|0},${p.alpha})`
        ctx.font = `400 ${FONT_SIZE * p.scale}px ${FONT_FAMILY}`
        ctx.fillText(p.ch, -p.w * p.scale * 0.5, 0)
        ctx.restore()
      }
    }

    function tick() {
      for (let i = 0; i < particles.length; i++) updateParticle(particles[i], i)
      render(); requestAnimationFrame(tick)
    }

    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY })
    window.addEventListener('mouseleave', () => { mouseX = -999; mouseY = -999 })
    window.addEventListener('touchmove', e => {
      e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY
    }, { passive: false })
    window.addEventListener('touchend', () => { mouseX = -999; mouseY = -999 })
    window.addEventListener('resize', () => { resize(); rebuild() })

    // Init with loading state
    resize()
    rebuild().then(() => {
      tick()
      setTimeout(() => {
        loader.classList.add('done')
        document.getElementById('controls').classList.add('visible')
        document.getElementById('info').classList.add('visible')
        document.getElementById('title').classList.add('visible')
      }, 600)
    })
  </script>
